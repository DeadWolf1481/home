<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel | Airports Transfer Turkey</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1c2128;
  --bg4:      #21262d;
  --border:   #30363d;
  --text:     #e6edf3;
  --text2:    #8b949e;
  --text3:    #6e7681;
  --blue:     #2ea8f0;
  --blue2:    #1a7fc1;
  --green:    #3fb950;
  --red:      #f85149;
  --yellow:   #d29922;
  --purple:   #8957e5;
  --gold:     #f0c040;
  --active-bg:#1c2a3a;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
button { cursor: pointer; font-family: inherit; font-size: 14px; }
input, textarea, select { font-family: inherit; font-size: 14px; }
a { text-decoration: none; color: inherit; }

/* ── Login Page ── */
#loginPage {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #1a2a3a 0%, var(--bg) 70%);
}
.login-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 3rem 2.5rem; width: 100%; max-width: 440px; text-align: center;
}
.login-title { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
.login-sub { font-size: 14px; color: var(--text2); margin-bottom: 2.5rem; }
.login-logo { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 2rem; }
.lf-input {
  display: block; width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 16px; color: var(--text); outline: none; margin-bottom: 1rem;
  transition: border-color 0.2s;
}
.lf-input::placeholder { color: var(--text3); }
.lf-input:focus { border-color: var(--blue); }
.lf-remember { display: flex; align-items: center; gap: 0.5rem; text-align: left; margin-bottom: 1.5rem; color: var(--text2); font-size: 13px; }
.lf-remember input { width: 16px; height: 16px; accent-color: var(--blue); }
.btn-login {
  width: 100%; background: var(--blue); color: white; border: none; border-radius: 8px;
  padding: 13px; font-size: 15px; font-weight: 600; transition: background 0.2s;
}
.btn-login:hover { background: var(--blue2); }
.login-error { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 1rem; display: none; }

/* ── App Layout ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* ── Top Nav ── */
.top-nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(6, 1fr);
  position: sticky; top: 0; z-index: 100;
}
.nav-item {
  padding: 1rem 1.25rem; text-align: center; cursor: pointer;
  border-right: 1px solid var(--border); transition: background 0.2s;
  user-select: none;
}
.nav-item:last-child { border-right: none; }
.nav-item:hover { background: var(--bg3); }
.nav-item.active { background: var(--active-bg); border-bottom: 2px solid var(--blue); }
.nav-item-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
.nav-item-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* ── Sub Nav ── */
.sub-nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 2rem; display: flex; gap: 0.5rem; align-items: center; min-height: 52px;
}
.sub-btn {
  padding: 8px 18px; border-radius: 6px; border: none;
  background: transparent; color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.2s;
}
.sub-btn:hover { background: var(--bg3); color: var(--text); }
.sub-btn.active { background: var(--bg4); color: var(--text); }
.sub-nav-right { margin-left: auto; }

/* ── Main Content ── */
.main-content { padding: 2rem; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

/* ── Section Header ── */
.section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
.section-header-left h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
.section-header-left p { font-size: 13px; color: var(--text2); }

/* ── Buttons ── */
.btn { border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue2); }
.btn-success { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.btn-success:hover { background: rgba(63,185,80,0.25); }
.btn-danger { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
.btn-danger:hover { background: rgba(248,81,73,0.25); }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--text3); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── Table ── */
.table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-toolbar { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.table-toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
.table-search { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); outline: none; min-width: 200px; }
.table-search:focus { border-color: var(--blue); }
.table-show { display: flex; align-items: center; gap: 0.5rem; font-size: 13px; color: var(--text2); }
.table-show select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--text); }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 14px 16px; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 13px; color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.table-footer { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); }
.table-pages { display: flex; gap: 0.35rem; }
.page-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 4px; padding: 4px 10px; font-size: 12px; }
.page-btn:hover { color: var(--text); border-color: var(--text3); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Badges ── */
.badge { display: inline-block; border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
.badge-blue { background: rgba(46,168,240,0.15); color: var(--blue); }
.badge-gray { background: rgba(139,148,158,0.15); color: var(--text2); }

/* ── Stats Cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; }
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 0.5rem; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 0.25rem; }
.stat-blue .stat-label { color: var(--blue); }
.stat-green .stat-label { color: var(--green); }
.stat-red .stat-label { color: var(--red); }
.stat-yellow .stat-label { color: var(--yellow); }
.stat-purple .stat-label { color: var(--purple); }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.2s ease; }
.modal-lg { max-width: 720px; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--text); }
.modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

/* ── Form ── */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 9px 12px; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── Dropdown Actions ── */
.actions-wrap { position: relative; display: inline-block; }
.actions-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 6px 12px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.actions-btn:hover { border-color: var(--text3); color: var(--text); }
.actions-menu { position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; min-width: 140px; z-index: 200; overflow: hidden; display: none; }
.actions-menu.open { display: block; }
.actions-menu-item { display: block; width: 100%; padding: 9px 14px; text-align: left; background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.actions-menu-item:hover { background: var(--bg4); color: var(--text); }
.actions-menu-item.danger { color: var(--red); }
.actions-menu-item.danger:hover { background: rgba(248,81,73,0.1); }

/* ── Vehicle Image ── */
.vehicle-img { width: 40px; height: 30px; object-fit: cover; border-radius: 4px; background: var(--bg4); vertical-align: middle; margin-right: 8px; }

/* ── Tracking ── */
.step-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.step-homepage   { background: rgba(139,148,158,0.15); color: var(--text2); }
.step-vehicle    { background: rgba(46,168,240,0.15); color: var(--blue); }
.step-form       { background: rgba(210,153,34,0.15); color: var(--yellow); }
.step-completed  { background: rgba(63,185,80,0.15); color: var(--green); }

/* ── Empty State ── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
.empty-state .empty-icon { font-size: 40px; margin-bottom: 1rem; }
.empty-state p { font-size: 14px; }

/* ── Confirm Dialog ── */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 90%; max-width: 380px; text-align: center; }
.confirm-icon { font-size: 40px; margin-bottom: 1rem; }
.confirm-title { font-size: 17px; font-weight: 700; margin-bottom: 0.5rem; }
.confirm-msg { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
.confirm-actions { display: flex; gap: 0.75rem; justify-content: center; }

/* ── Toast ── */
#toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 0.5rem; animation: toastIn 0.25s ease; min-width: 240px; }
.toast-item.success { border-color: rgba(63,185,80,0.4); }
.toast-item.error { border-color: rgba(248,81,73,0.4); }
@keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

/* ── Logout ── */
.top-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0.6rem 2rem; display: flex; align-items: center; justify-content: flex-end; gap: 1rem; }
.top-bar-user { font-size: 13px; color: var(--text2); }
.top-bar-logout { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 12px; font-size: 12px; }
.top-bar-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Responsive ── */
@media(max-width:900px) {
  .top-nav { grid-template-columns: repeat(3, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width:600px) {
  .main-content { padding: 1rem; }
  .top-nav { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- ── LOGIN PAGE ───────────────────────────────────────────────── -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">AIRPORTS TRANSFER TURKEY</div>
    <h1 class="login-title">Sign In</h1>
    <p class="login-sub">Admin Panel</p>
    <div class="login-error" id="loginError"></div>
    <input class="lf-input" type="email" id="loginEmail" placeholder="E-Mail" autocomplete="email" />
    <input class="lf-input" type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <div class="lf-remember">
      <input type="checkbox" id="rememberMe" />
      <label for="rememberMe">Remember Me</label>
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────────────────────── -->
<div id="app">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-bar-user" id="topBarUser"></span>
    <button class="top-bar-logout" onclick="doLogout()">Sign Out</button>
  </div>

  <!-- Main Nav -->
  <div class="top-nav">
    <div class="nav-item active" onclick="switchSection('reservations')" data-section="reservations">
      <div class="nav-item-title">RESERVATIONS</div>
      <div class="nav-item-sub">Transfers &amp; Customers</div>
    </div>
    <div class="nav-item" onclick="switchSection('content')" data-section="content">
      <div class="nav-item-title">CONTENT</div>
      <div class="nav-item-sub">Blog, FAQ, Pages</div>
    </div>
    <div class="nav-item" onclick="switchSection('vehicles')" data-section="vehicles">
      <div class="nav-item-title">VEHICLES</div>
      <div class="nav-item-sub">Transfer Vehicles</div>
    </div>
    <div class="nav-item" onclick="switchSection('accounting')" data-section="accounting">
      <div class="nav-item-title">ACCOUNTING</div>
      <div class="nav-item-sub">Revenue</div>
    </div>
    <div class="nav-item" onclick="switchSection('settings')" data-section="settings">
      <div class="nav-item-title">SETTINGS</div>
      <div class="nav-item-sub">General &amp; Users</div>
    </div>
    <div class="nav-item" onclick="switchSection('messages')" data-section="messages">
      <div class="nav-item-title">MESSAGES</div>
      <div class="nav-item-sub">Contact Messages</div>
    </div>
  </div>

  <!-- Sub Nav -->
  <div class="sub-nav" id="subNav"></div>

  <!-- Content -->
  <div class="main-content" id="mainContent">
    <div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div>
  </div>
</div>

<!-- ── MODAL ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title">
      <span id="modalTitle">Modal</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ── CONFIRM ────────────────────────────────────────────────────── -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title" id="confirmTitle">Are you sure?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Change this to your Railway/Render backend URL after deployment
const API_URL = 'https://home-production-6910.up.railway.app';

// ─── STATE ────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('att_token') || sessionStorage.getItem('att_token');
let currentSection = 'reservations';
let currentSub = '';
let currentUser = null; // stores logged-in user with role

// Role permissions
const ROLE_ACCESS = {
  admin:      ['reservations', 'content', 'vehicles', 'accounting', 'settings', 'messages'],
  accounting: ['reservations', 'accounting', 'messages'],
  editor:     ['content', 'vehicles'],
  driver:     [],
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_URL + path, { ...opts, headers: { ...headers, ...opts.headers } });
  if (res.status === 401) { doLogout(); throw new Error('Unauthorized'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.innerHTML = (type === 'success' ? '✅' : '❌') + ' ' + msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function statusBadge(s) {
  const map = {
    pending: 'badge-yellow', approved: 'badge-green', cancelled: 'badge-red',
    active: 'badge-green', passive: 'badge-red', unread: 'badge-blue', read: 'badge-gray',
  };
  return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, body, footer = '', large = false) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer;
  const box = document.getElementById('modalBox');
  box.className = large ? 'modal modal-lg' : 'modal';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ─── CONFIRM ─────────────────────────────────────────────────────────────────
function openConfirm(title, msg, onOk) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }

  const btn = document.querySelector('.btn-login');
  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    token = data.token;
    currentUser = data.user;
    const remember = document.getElementById('rememberMe').checked;
    if (remember) localStorage.setItem('att_token', token);
    else sessionStorage.setItem('att_token', token);

    if (data.user.role === 'driver') {
      window.location.href = 'drivers.html';
      return;
    }

    document.getElementById('topBarUser').textContent = `${data.user.name || data.user.email} (${data.user.role})`;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    applyRoleNav(data.user.role);
    const allowed = ROLE_ACCESS[data.user.role] || ROLE_ACCESS.editor;
    switchSection(allowed[0]);
  } catch (err) {
    errEl.textContent = 'Invalid email or password.';
    errEl.style.display = 'block';
  } finally {

const SECTIONS = {
  reservations: {
    subs: currentUser?.role === 'driver' ? ['Transfer Reservations'] : ['Transfer Reservations', "Drivers' Jobs", 'Customers'],
    render: (sub) => sub === 'Customers' ? renderCustomers() : sub === "Drivers' Jobs" ? renderDriversJobs() : renderReservations(),
  },
  content: {
    subs: ['Blog', 'Blog Detail Pages', 'FAQ', 'Pages'],
    render: (sub) => sub === 'Blog' ? renderBlog() : sub === 'FAQ' ? renderFaq() : sub === 'Blog Detail Pages' ? renderBlogDetailPages() : renderPages(),
  },
  vehicles: {
    subs: ['Vehicles'],
    render: () => renderVehicles(),
  },
  accounting: {
    subs: ['Revenue', 'Payment Links'],
    render: (sub) => sub === 'Payment Links' ? renderPaymentLinks() : renderAccounting(),
  },
  settings: {
    subs: ['General', 'Users', 'Drivers', 'Extra Price Settings', 'Driver Applications'],
    render: (sub) => renderSettings(sub),
  },
  messages: {
    subs: ['Contact Messages', 'Mail Template'],
    render: (sub) => sub === 'Mail Template' ? renderMailTemplate() : renderMessages(),
  },
};

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === section);
  });

  const cfg = SECTIONS[section];
  const subNav = document.getElementById('subNav');
  subNav.innerHTML = '';

  cfg.subs.forEach((sub, i) => {
    const btn = document.createElement('button');
    btn.className = 'sub-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sub;
    btn.onclick = () => {
      subNav.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSub = sub;
      cfg.render(sub);
    };
    subNav.appendChild(btn);
  });

  currentSub = cfg.subs[0];
  cfg.render(cfg.subs[0]);
}

function getStepBadge(step) {
  const map = {
    homepage:    { label: '🏠 Homepage',    bg: 'rgba(139,148,158,0.15)', color: 'var(--text2)' },
    results:     { label: '🔍 Results',     bg: 'rgba(46,168,240,0.15)',  color: 'var(--blue)'  },
    form_filled: { label: '📝 Form Filled', bg: 'rgba(210,153,34,0.15)', color: 'var(--yellow)' },
    completed:   { label: '✅ Completed',   bg: 'rgba(63,185,80,0.15)',  color: 'var(--green)'  },
  };
  const s = map[step] || { label: step, bg: 'rgba(139,148,158,0.15)', color: 'var(--text2)' };
  return `<span style="background:${s.bg};color:${s.color};border-radius:5px;padding:3px 10px;font-size:12px;font-weight:600">${s.label}</span>`;
}

function filterCustomers() {

async function saveVehicle(id) {
  const body = {
    name: document.getElementById('vName').value.trim(),
    passenger_capacity: document.getElementById('vPax').value,
    luggage_capacity: document.getElementById('vLug').value,
    price: document.getElementById('vPrice').value,

    image_url: document.getElementById('vImg').value.trim() || null,
  };

    return toast('Please fill required fields', 'error');
  try {
    if (id) await api(`/api/vehicles/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    else await api('/api/vehicles', { method: 'POST', body: JSON.stringify(body) });

}

    'blog-galatatower': { title: 'Galata Tower: Best Views in Istanbul', subtitle: 'Sightseeing', intro: "Rising above the rooftops of Beyoğlu, the Galata Tower offers the finest panoramic view of Istanbul.", content: "The Galata Tower dates from 1348. The observation gallery at 63 metres offers panoramic views.\n\nBook tickets online — queues can be long in high season.", image: 'pngler/galata.png' },

  };

    return '';
  }

  function getStatus(key) {

    const page = BLOG_PAGES.find(p => p.file === key);
    return page ? (page.defaultStatus || 'active') : 'active';
  }

  async function togglePageStatus(key) {
    const current = getStatus(key);
    const newStatus = current === 'active' ? 'passive' : 'active';
    const data = {
      title:    document.getElementById('bdt-title-' + key)?.value || getVal(key,'title'),
      subtitle: document.getElementById('bdt-subtitle-' + key)?.value || getVal(key,'subtitle'),
      intro:    document.getElementById('bdt-intro-' + key)?.value || getVal(key,'intro'),
      content:  document.getElementById('bdt-content-' + key)?.value || getVal(key,'content'),

            </div>
            <div style="display:flex;gap:8px;align-items:center" onclick="event.stopPropagation()">
              ${getStatus(p.file) === 'active' 
                ? '<span class="badge badge-green" style="margin-right:4px">Active</span>' 
                : '<span class="badge badge-gray" style="margin-right:4px">Passive</span>'}
              <button class="btn btn-ghost btn-sm" onclick="window._togglePageStatus('${p.file}')">${getStatus(p.file) === 'active' ? '⏸' : '▶'}</button>
              <a href="${p.file}.html" target="_blank" class="btn btn-ghost btn-sm">👁</a>
              <span id="arrow-${p.file}" style="color:var(--text2);font-size:18px" onclick="toggleBlogDetailEdit('${p.file}')">▾</span>
            </div>

          <div id="edit-${p.file}" style="display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)">

async function toggleDailyRotation() {
  try {
    const current = await api('/api/settings/blog-pages/__rotation__');
    const enabled = current ? current.enabled !== false : true;
    await api('/api/settings/blog-pages/__rotation__', {
      method: 'PUT',
      body: JSON.stringify({ enabled: !enabled }),
    });
    toast('Daily rotation ' + (!enabled ? 'enabled ✅' : 'disabled ⏸'));
    renderBlogDetailPages();
  } catch (err) { toast('Error: ' + err.message, 'error'); }
}

function toggleBlogDetailEdit(file) {
  const el = document.getElementById('edit-' + file);
  const arrow = document.getElementById('arrow-' + file);
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

async function createNewBlogPage() {
  const name    = document.getElementById('nbp-name').value.trim();
  const title   = document.getElementById('nbp-title').value.trim();
  const label   = document.getElementById('nbp-label').value.trim() || 'Blog';
  const intro   = document.getElementById('nbp-intro').value.trim();
  const content = document.getElementById('nbp-content').value.trim();
  const image   = document.getElementById('nbp-img').value.trim();

  if (!name || !title || !intro || !content) return toast('Please fill required fields', 'error');

  const fileKey = 'blog-' + name;

  // Save to database
  try {
    await api('/api/settings/blog-pages/' + fileKey, {
      method: 'PUT',
      body: JSON.stringify({ title, subtitle: label, intro, content, image }),
    });
  } catch(e) {}

  // Save to blog API as a post too
  try {
    await api('/api/blog', {
      method: 'POST',
      body: JSON.stringify({ title, excerpt: intro.slice(0,200), content, image_url: image || null, status: 'active', slug: fileKey + '-' + Date.now() }),
    });
  } catch(e) {}

  // Add to BLOG_PAGES in memory
  if (!BLOG_PAGES.find(p => p.file === fileKey)) {
    BLOG_PAGES.push({ file: fileKey, label: title, emoji: '📝' });
  }

  // Generate and download HTML file
  const html = generateBlogHTML(fileKey, title, label, intro, content, image);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileKey + '.html'; a.click();
  URL.revokeObjectURL(url);

  toast('Blog page created! Upload ' + fileKey + '.html to GitHub home/ folder.');
  closeModalDirect();
  renderBlogDetailPages();
}

function openEditUserModal(u) {
  openModal('Edit User', `
    <div class="form-group"><label class="form-label">Full Name</label>
      <input class="form-input" id="eu-name" value="${u.name || ''}" /></div>
    <div class="form-group"><label class="form-label">Email *</label>
      <input class="form-input" id="eu-email" type="email" value="${u.email}" /></div>
    <div class="form-group"><label class="form-label">Role *</label>
      <select class="form-select" id="eu-role">
        <option value="editor" ${u.role === 'editor' ? 'selected' : ''}>Editor — Content & Vehicles</option>
        <option value="accounting" ${u.role === 'accounting' ? 'selected' : ''}>Accounting — Reservations & Revenue</option>
        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin — Full Access</option>
      </select></div>`,
    `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="saveEditUser(${u.id})">Save Changes</button>`
  );
}

async function saveEditUser(id) {
  const name  = document.getElementById('eu-name').value.trim();
  const email = document.getElementById('eu-email').value.trim();
  const role  = document.getElementById('eu-role').value;
  if (!email) return toast('Email required', 'error');
  try {
    await api(`/api/auth/users/${id}`, {
      method: 'PUT',
      body: JSON.stringify({ name, email, role }),
    });
    toast('User updated');
    closeModalDirect();
    renderSettings('Users');
  } catch (err) { toast('Error: ' + err.message, 'error'); }
}

function openAddUserModal() {
  openModal('Add New User', `
    <div class="form-group"><label class="form-label">Full Name</label>
      <input class="form-input" id="nu-name" placeholder="John Doe" /></div>
    <div class="form-group"><label class="form-label">Email *</label>
      <input class="form-input" id="nu-email" type="email" placeholder="john@example.com" /></div>
    <div class="form-group"><label class="form-label">Password *</label>
      <input class="form-input" id="nu-pass" type="password" placeholder="Min 6 characters" /></div>
    <div class="form-group"><label class="form-label">Role *</label>
      <select class="form-select" id="nu-role">
        <option value="editor">Editor — Content & Vehicles</option>
        <option value="accounting">Accounting — Reservations & Revenue</option>
        <option value="admin">Admin — Full Access</option>
      </select></div>`,
    `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="saveNewUser()">Add User</button>`
  );
}

async function saveNewUser() {
  const name  = document.getElementById('nu-name').value.trim();
  const email = document.getElementById('nu-email').value.trim();
  const pass  = document.getElementById('nu-pass').value;
  const role  = document.getElementById('nu-role').value;
  if (!email || !pass) return toast('Email and password required', 'error');
  if (pass.length < 6) return toast('Password must be at least 6 characters', 'error');
  try {
    await api('/api/auth/users', {
      method: 'POST',
      body: JSON.stringify({ name, email, password: pass, role }),
    });
    toast('User added successfully');
    closeModalDirect();
    renderSettings('Users');
  } catch (err) { toast('Error: ' + err.message, 'error'); }
}

async function deleteUser(id) {
  openConfirm('Delete User', 'This user will be permanently deleted and cannot log in anymore.', async () => {
    try {
      await api(`/api/auth/users/${id}`, { method: 'DELETE' });
      toast('User deleted');
      renderSettings('Users');
    } catch (err) { toast('Error: ' + err.message, 'error'); }
  });
}

function openChangePasswordModal(userId) {
  const id = userId || currentUser?.id;
  openModal('Change Password', `
    <div class="form-group"><label class="form-label">Current Password *</label>
      <input class="form-input" id="cp-current" type="password" placeholder="Enter current password" /></div>
    <div class="form-group"><label class="form-label">New Password *</label>
      <input class="form-input" id="cp-new" type="password" placeholder="Min 6 characters" /></div>
    <div class="form-group"><label class="form-label">Confirm New Password *</label>
      <input class="form-input" id="cp-confirm" type="password" /></div>`,
    `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="savePassword(${id})">Change Password</button>`
  );
}

async function savePassword(id) {
  const current = document.getElementById('cp-current').value;
  const np = document.getElementById('cp-new').value;
  const cp = document.getElementById('cp-confirm').value;
  if (!current) return toast('Please enter your current password', 'error');
  if (!np || np.length < 6) return toast('Password must be at least 6 characters', 'error');
  if (np !== cp) return toast('Passwords do not match', 'error');
  try {
    await api(`/api/auth/users/${id}/password`, { method: 'PUT', body: JSON.stringify({ password: np, currentPassword: current }) });
    toast('Password changed successfully ✅');
    closeModalDirect();
  } catch (err) { toast('Error: ' + err.message, 'error'); }
}


function toggleDriverPw(id, plain) {
  const el = document.getElementById('pw-' + id);
  if (!el) return;
  if (el.textContent === '••••••••') {
    el.textContent = plain;
    el.style.color = 'var(--green)';
  } else {
    el.textContent = '••••••••';
    el.style.color = 'var(--yellow)';
  }
}

function setDriverStatus(id, status) {

    `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="confirmDriverStatus(${id},'${status}')">${label}</button>`
  );

async function confirmDriverStatus(id, status) {
  const notes = document.getElementById('driver-note')?.value.trim() || '';
  try {
    await api('/api/driver-applications/' + id + '/status', { method: 'PUT', body: JSON.stringify({ status, admin_notes: notes }) });
    toast(status === 'approved' ? '✅ Approved — email sent' : '❌ Rejected — email sent');
    closeModalDirect();
    renderSettings('Driver Applications');
  } catch (err) { toast('Error: ' + err.message, 'error'); }

function saveTemplate(type) {

    localStorage.setItem('att_mail_templates', JSON.stringify(saved));

  const el = document.getElementById('tpl-' + type);
  if (el) el.value = DEFAULT_TEMPLATES[type];

function getTemplate(type, vars) {
  try {
    const saved = JSON.parse(localStorage.getItem('att_mail_templates') || '{}');
    let tpl = saved[type] || DEFAULT_TEMPLATES[type];
    if (vars) Object.keys(vars).forEach(k => { tpl = tpl.replace(new RegExp('{' + k + '}', 'g'), vars[k] || ''); });
    return tpl;
  } catch(e) { return ''; }
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
async function renderMessages() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div>';
  try {
    const messages = await api('/api/contact');
    mc.innerHTML = `
      <div class="section-header">
        <div class="section-header-left">
          <h2>Contact Messages</h2>
          <p>Messages received from the website contact form.</p>
        </div>
      </div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="table-show">Show
            <select onchange="filterMsgCount(this.value)">
              <option>10</option><option selected>25</option><option>50</option><option>100</option>
            </select>
          </div>
          <div class="table-toolbar-right">
            <input class="table-search" placeholder="Search..." oninput="filterTable(this,'msgTable')" />
          </div>
        </div>
        <div style="overflow-x:auto">
        <table id="msgTable">
          <thead><tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email ↓</th>
            <th>Subject</th>
            <th>Message</th>
            <th>Date</th>
            <th>Actions</th>
          </tr></thead>
          <tbody>
            ${messages.length ? messages.map(m => `<tr>
              <td>${m.id}</td>
              <td style="font-weight:600;white-space:nowrap">${m.name}</td>
              <td style="font-size:12px">${m.phone || '—'}</td>
              <td style="font-size:12px;color:var(--blue)">${m.email}</td>
              <td style="font-size:12px;max-width:180px">${m.subject || '—'}</td>
              <td style="font-size:12px;color:var(--text2);max-width:280px">${(m.message || '').slice(0, 80)}${m.message?.length > 80 ? '…' : ''}</td>
              <td style="font-size:11px;color:var(--text2);white-space:nowrap">${fmtDate(m.created_at)}</td>
              <td>
                <div style="display:flex;gap:6px;align-items:center">
                  <button class="btn btn-ghost btn-sm" onclick="viewMessage(${JSON.stringify(m).replace(/"/g,'&quot;')})" title="View">👁</button>
                  <button class="btn btn-primary btn-sm" onclick="openReplyModal(${JSON.stringify(m).replace(/"/g,'&quot;')})" title="Reply">✉️ Reply</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMessage(${m.id})" title="Delete">🗑</button>
                  ${localStorage.getItem('replied_' + m.id) ? '<span title="Reply sent" style="font-size:18px">↩️</span>' : ''}
                </div>
              </td>
            </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text2)">No messages yet</td></tr>'}
          </tbody>
        </table>
        </div>
        <div class="table-footer">
          <span>${messages.length} message${messages.length !== 1 ? 's' : ''}</span>
        </div>
      </div>`;
  } catch (err) {
    mc.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${err.message}</p></div>`;
  }
}

async function deleteMessage(id) {
  openConfirm('Delete Message', 'This message will be permanently deleted.', async () => {
    try {
      await api(`/api/contact/${id}`, { method: 'DELETE' });
      localStorage.removeItem('replied_' + id);

      renderMessages();

          <div><span style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:0.5px">Status</span><br>${statusBadge(m.status)}</div>

function openReplyModal(m) {
  const tpl = '';

  openModal(`Reply to ${m.name}`, `
    <div style="background:var(--bg3);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--text2)">
      <b style="color:var(--text)">To:</b> ${m.name} &lt;${m.email}&gt;<br>
      <b style="color:var(--text)">Re:</b> ${m.subject || 'Your message'}
    </div>
    <div style="background:var(--bg3);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;border-left:3px solid var(--border)">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Original message:</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6">${m.message}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Your Reply *</label>
      <textarea class="form-textarea" id="replyText" style="min-height:160px" placeholder="Type your reply here...">${tpl.includes('{replyText}') ? '' : tpl}</textarea>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-top:0.5rem">
      📝 Signature from <button onclick="switchSection('messages');document.querySelectorAll('.sub-btn')[1]?.click()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:11px;padding:0">Mail Template</button> will be appended automatically.
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="sendReply('${m.email}','${(m.subject || 'Your message').replace(/'/g,"\\'")}',${m.id})">✉️ Send Reply</button>`
  );
}

async function sendReply(email, subject, msgId) {
  const replyText = document.getElementById('replyText').value.trim();
  if (!replyText) return toast('Please write a reply first', 'error');

  const btn = document.querySelector('#modalFooter .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  try {
    await api(`/api/contact/${msgId}/reply`, {
      method: 'POST',
      body: JSON.stringify({ replyText }),
    });
    toast('Reply sent successfully ✉️');
    localStorage.setItem('replied_' + msgId, '1');
    closeModalDirect();
    renderMessages();
  } catch (err) {
    const body = replyText;
    window.open('mailto:' + email + '?subject=' + encodeURIComponent('Re: ' + subject) + '&body=' + encodeURIComponent(body), '_blank');
    toast('Opened in mail client (API error: ' + err.message + ')', 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✉️ Send Reply'; }
  }
}

async function markRead(id) {
  try {
    await api(`/api/contact/${id}/read`, { method: 'PUT' });
    toast('Marked as read');
    renderMessages();
  } catch (err) { toast('Error', 'error'); }
}


function toggleActions(btn) {
  const menu = btn.nextElementSibling;
  const isOpen = menu.classList.contains('open');
  closeAllActions();
  if (!isOpen) {
    menu.classList.add('open');
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.actions-wrap')) {
    closeAllActions();
  }
});

function closeAllActions() {
  document.querySelectorAll('.actions-menu.open').forEach(m => m.classList.remove('open'));
}

function closeAllActionsOnce() {
  closeAllActions();
}

function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// ─── AUTO LOGIN (if token exists) ─────────────────────────────────────────────
if (token) {
  api('/api/auth/me').then(user => {
    if (user.role === 'driver') { window.location.href = 'drivers.html'; return; }
    currentUser = user;
    document.getElementById('topBarUser').textContent = `${user.name || user.email} (${user.role})`;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    applyRoleNav(user.role);
    const allowed = ROLE_ACCESS[user.role] || ROLE_ACCESS.editor;
    switchSection(allowed[0]);
  }).catch(() => {
    localStorage.removeItem('att_token');
    sessionStorage.removeItem('att_token');
    token = null;
  });
}
